<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>M3U8 Video Feed</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen font-sans selection:bg-blue-200 selection:text-blue-900">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 id="header-title" class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="text-blue-600">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
                StreamFeed
            </h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Grid Container for Posts -->
        <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Posts will be injected here by JavaScript -->
        </div>

    </main>

    <script>
        /**
         * Function to render the posts to the DOM
         */
        function renderPosts(data) {
            const container = document.getElementById('posts-container');
            const headerTitle = document.getElementById('header-title');

            // Update the header title if available
            if (data.headerTitle) {
                // Preserving the SVG icon
                const svgIcon = headerTitle.querySelector('svg').outerHTML;
                headerTitle.innerHTML = `${svgIcon} ${data.headerTitle}`;
            }

            // Clear container before rendering
            container.innerHTML = '';

            const streams = data.streams || [];
            streams.forEach((post) => {
                // Create Post Card element
                const postElement = document.createElement('article');
                postElement.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow duration-300 flex flex-col";

                // HTML structure for the post
                postElement.innerHTML = `
                    <!-- Content Area -->
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="p-2 bg-blue-50 text-blue-600 rounded-lg shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                            </div>
                            <h2 class="text-lg font-semibold text-slate-900 line-clamp-1">${post.title}</h2>
                        </div>
                        
                        <p class="text-slate-600 text-sm mb-4 line-clamp-2">${post.description || ''}</p>
                        
                        <!-- Watch Link Button -->
                        <div class="mt-auto border-t border-slate-100 pt-4">
                            <a href="${post.m3u8Link}" target="_blank" class="flex items-center justify-center w-full gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 px-4 rounded-lg transition-colors duration-200">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Click me for watching
                            </a>
                        </div>
                    </div>
                `;

                container.appendChild(postElement);
            });
        }

        // Initialize the page once the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            // Cache-busting: Add timestamp to force fresh data.json fetch
            const cachebustedUrl = `data.json?v=${Date.now()}`;
            fetch(cachebustedUrl)
                .then(response => response.json())
                .then(data => {
                    renderPosts(data);
                })
                .catch(error => {
                    console.error('Error loading configuration:', error);
                    let message = 'Failed to load streams. Please check data.json.';
                    
                    // Specific message for local file access issues
                    if (window.location.protocol === 'file:') {
                        message = '<strong>Error:</strong> Local file access blocked by browser security.<br>Please use a local web server (like VS Code Live Server) to view this page.';
                    }
                    
                    document.getElementById('posts-container').innerHTML = `
                        <div class="col-span-full text-center py-12 bg-red-50 rounded-xl border border-red-100">
                            <p class="text-red-700">${message}</p>
                        </div>
                    `;
                });
        });
    </script>
</body>

</html>
